      <div class="field-group full">
        <div class="field-label">Action / Shortcut / URL</div>
        <input id="ed-action" class="field-input" placeholder="e.g. Ctrl+Alt+M  or  https://...  or  app://..." />
      </div>

      <!-- Notes -->
      <div class="field-group full">
        <div class="field-label">Notes</div>
        <textarea id="ed-notes" class="field-textarea" placeholder="Button purpose, context, trigger conditions..."></textarea>
      </div>

      <!-- Script -->
      <div class="field-group full">
        <div class="field-label">Script / Command</div>
        <textarea id="ed-script" class="field-textarea script-area" placeholder="# Paste script, PowerShell, bash, AppleScript, AHK, or Multi-Action YAML here...
# Example:
# powershell -Command &quot;Start-Process devenv&quot;
# kubectl get pods -A | clip"></textarea>
      </div>

      <!-- Save button -->
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button class="btn btn-danger" onclick="clearKey()">Clear Key</button>
        <button class="btn btn-primary" onclick="saveKey()">вЬУ Save Key</button>
