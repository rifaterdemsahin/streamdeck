  </div>
</div>

<!-- EMOJI PICKER -->
<div id="emoji-picker" class="emoji-picker">
  <input class="emoji-search" id="emoji-search" placeholder="Search emojis..." oninput="filterEmojis()" />
  <div class="emoji-cats" id="emoji-cats"></div>
  <div class="emoji-grid" id="emoji-grid"></div>
</div>

<!-- YAML MODAL -->
