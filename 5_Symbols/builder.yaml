    <pre class="yaml-output" id="yaml-output"></pre>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="copyYaml()">Copy</button>
      <button class="btn btn-success" onclick="downloadYaml()">вЖУ Download</button>
      <button class="btn btn-ghost" onclick="document.getElementById('modal-overlay').classList.remove('open')">Close</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast">вЬУ Saved</div>

<script>
// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
// DATA
// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
const ROWS = 4, COLS = 8;
let buttons = Array.from({length: ROWS * COLS}, (_, i) => ({
  id: i,
  row: Math.floor(i / COLS) + 1,
  col: (i % COLS) + 1,
  emoji: '',
  label: '',
  category: '',
  color: '',
  action: '',
  notes: '',
  script: ''
}));

let activeKey = null;
let selectedColor = '';

// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
// EMOJI DATA
// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
const EMOJI_CATS = {
  'в≠Р': ['в≠Р','рЯФ•','рЯТ°','вЪ°','рЯОѓ','рЯЪА','вЬЕ','вЭМ','вЪ†пЄП','рЯФФ','рЯУМ','рЯФТ','рЯФУ','рЯФС','рЯФР','рЯТО','рЯПЖ','рЯОЦпЄП','рЯ•З','рЯОЧпЄП'],
  'рЯЫ†пЄП': ['рЯЫ†пЄП','вЪЩпЄП','рЯФІ','рЯФ®','рЯФ©','рЯ™Ы','рЯФђ','рЯФ≠','рЯТї','рЯЦ•пЄП','рЯЦ®пЄП','вМ®пЄП','рЯЦ±пЄП','рЯУ±','рЯУ≤','вШОпЄП','рЯУ°','рЯФМ','рЯФЛ','рЯТЊ'],
  'рЯОђ': ['рЯОђ','рЯО•','рЯУє','рЯОЮпЄП','рЯУљпЄП','рЯО¶','рЯОЩпЄП','рЯОЪпЄП','рЯОЫпЄП','рЯУї','рЯФК','рЯФИ','рЯФЙ','рЯОµ','рЯОґ','рЯО§','рЯОІ','рЯОЉ','рЯ•Б','рЯОє'],
  'рЯ§Ц': ['рЯ§Ц','рЯІ†','рЯТђ','рЯЧ£пЄП','рЯСБпЄП','рЯ¶Њ','рЯ¶њ','рЯІђ','вЪЧпЄП','рЯФЃ','рЯ™Д','вЬ®','рЯМР','рЯХЄпЄП','рЯУ°','рЯУК','рЯУИ','рЯУЙ','рЯЧГпЄП','рЯЧВпЄП'],
  'рЯУЛ': ['рЯУЛ','рЯУЭ','рЯУД','рЯУГ','рЯУС','рЯУК','рЯУИ','рЯУЙ','рЯЧТпЄП','рЯУЕ','рЯУЖ','рЯЧУпЄП','рЯУЗ','рЯЧГпЄП','рЯЧДпЄП','рЯУБ','рЯУВ','рЯЧВпЄП','рЯЧСпЄП','рЯУМ'],
  'рЯП†': ['рЯП†','рЯП°','рЯС®вАНрЯС©вАНрЯСІвАНрЯС¶','рЯСґ','рЯСІ','рЯІТ','рЯС©','рЯІС','рЯУ±','рЯТђ','рЯУЮ','рЯПЂ','рЯЪМ','рЯЫТ','рЯНХ','вШХ','рЯЫЛпЄП','рЯЫПпЄП','рЯМњ','рЯМ≥'],
  'рЯОѓ': ['рЯОѓ','вП≤пЄП','вМЫ','вП∞','рЯФХ','рЯУµ','рЯ§Ђ','рЯІШ','рЯТ§','рЯМЩ','рЯМЕ','вШАпЄП','рЯМ§пЄП','рЯМИ','вЪ°','рЯФЛ','рЯУі','рЯФЗ','рЯЪЂ','вЫФ'],
  'рЯЪА': ['рЯЪА','вЬИпЄП','рЯЫЄ','рЯЫ∞пЄП','рЯМН','рЯМО','рЯМП','рЯЧЇпЄП','рЯІ≠','рЯПФпЄП','вЫ∞пЄП','рЯМЛ','рЯПЭпЄП','рЯМК','рЯТІ','вЭДпЄП','рЯФ•','рЯТ•','рЯМ™пЄП','в≠Р'],
  'рЯУ¶': ['рЯУ¶','рЯУЂ','рЯУђ','рЯУ≠','рЯУЃ','вЬЙпЄП','рЯУІ','рЯУ®','рЯУ©','рЯТМ','рЯУ§','рЯУ•','рЯЧ≥пЄП','рЯУЬ','рЯУ∞','рЯЧЮпЄП','рЯУУ','рЯУФ','рЯУТ','рЯУХ'],
  'рЯО®': ['рЯО®','рЯЦМпЄП','рЯЦНпЄП','вЬПпЄП','рЯЦКпЄП','рЯЦЛпЄП','рЯУР','рЯУП','вЬВпЄП','рЯІµ','рЯІґ','рЯ™°','рЯО≠','рЯО™','рЯО°','рЯОҐ','рЯО†','рЯО™','рЯПЯпЄП','рЯОЖ'],
};

let allEmojis = Object.values(EMOJI_CATS).flat();
let filteredEmojis = [...allEmojis];
let activeCat = 'в≠Р';

// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
// RENDER GRID
// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
function renderGrid() {
  const grid = document.getElementById('button-grid');
  grid.innerHTML = '';
  buttons.forEach((b, i) => {
    const btn = document.createElement('div');
    btn.className = 'key-btn' + (b.emoji || b.label ? ' has-content' : '') + (b.notes || b.script ? ' has-note' : '') + (activeKey === i ? ' active' : '');
    btn.innerHTML = `
      <span class="key-num">${String(i+1).padStart(2,'0')}</span>
      <span class="key-has-note"></span>
      ${b.color ? `<div class="key-color-overlay" style="background:${b.color}"></div>` : ''}
      ${b.emoji ? `<div class="key-emoji">${b.emoji}</div>` : ''}
      ${b.label ? `<div class="key-text">${b.label}</div>` : (!b.emoji ? '<div class="key-empty-hint">+</div>' : '')}
    `;
    if (b.color) {
      btn.style.borderColor = b.color + '66';
    }
    btn.addEventListener('click', () => openEditor(i));
    grid.appendChild(btn);
  });
}

// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
// EDITOR
// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
function openEditor(idx) {
  activeKey = idx;
  const b = buttons[idx];
  document.getElementById('editor-key-id').textContent = `KEY ${String(idx+1).padStart(2,'0')}`;
  document.getElementById('ed-row').textContent = b.row;
  document.getElementById('ed-col').textContent = b.col;
  document.getElementById('emoji-display').textContent = b.emoji || 'пЉЛ';
  document.getElementById('ed-emoji-text').value = b.emoji || '';
  document.getElementById('ed-label').value = b.label || '';
  document.getElementById('ed-category').value = b.category || '';
  document.getElementById('ed-action').value = b.action || '';
  document.getElementById('ed-notes').value = b.notes || '';
  document.getElementById('ed-script').value = b.script || '';
  selectedColor = b.color || '';
  // Update swatch selection
  document.querySelectorAll('.swatch').forEach(s => {
    s.classList.toggle('selected', s.dataset.color === selectedColor);
  });
  document.getElementById('editor-panel').classList.add('open');
  renderGrid();
  document.getElementById('ed-label').focus();
}

function closeEditor() {
  activeKey = null;
  document.getElementById('editor-panel').classList.remove('open');
  closeEmojiPicker();
  renderGrid();
}

function saveKey() {
  if (activeKey === null) return;
  const emojiText = document.getElementById('ed-emoji-text').value.trim();
  const displayEmoji = document.getElementById('emoji-display').textContent;
  buttons[activeKey] = {
    ...buttons[activeKey],
    emoji: emojiText || (displayEmoji !== 'пЉЛ' ? displayEmoji : ''),
    label: document.getElementById('ed-label').value.trim(),
    category: document.getElementById('ed-category').value,
    color: selectedColor,
    action: document.getElementById('ed-action').value.trim(),
    notes: document.getElementById('ed-notes').value.trim(),
    script: document.getElementById('ed-script').value.trim(),
  };
  renderGrid();
  showToast('вЬУ Key saved');
}

function clearKey() {
  if (activeKey === null) return;
  buttons[activeKey] = { ...buttons[activeKey], emoji:'', label:'', category:'', color:'', action:'', notes:'', script:'' };
  document.getElementById('emoji-display').textContent = 'пЉЛ';
  document.getElementById('ed-emoji-text').value = '';
  document.getElementById('ed-label').value = '';
  document.getElementById('ed-category').value = '';
  document.getElementById('ed-action').value = '';
  document.getElementById('ed-notes').value = '';
  document.getElementById('ed-script').value = '';
  selectedColor = '';
  document.querySelectorAll('.swatch').forEach(s => s.classList.toggle('selected', s.dataset.color === ''));
  renderGrid();
}

// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
// COLOR
// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
function selectColor(el, color) {
  selectedColor = color;
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
}

// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
// EMOJI PICKER
// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
function buildEmojiPicker() {
  const catBar = document.getElementById('emoji-cats');
  catBar.innerHTML = '';
  Object.keys(EMOJI_CATS).forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'emoji-cat-btn' + (cat === activeCat ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => {
      activeCat = cat;
      filteredEmojis = EMOJI_CATS[cat];
      document.getElementById('emoji-search').value = '';
      document.querySelectorAll('.emoji-cat-btn').forEach(b => b.classList.toggle('active', b.textContent === cat));
      renderEmojiGrid();
    };
    catBar.appendChild(btn);
  });
  filteredEmojis = EMOJI_CATS[activeCat];
  renderEmojiGrid();
}

function renderEmojiGrid() {
  const grid = document.getElementById('emoji-grid');
  grid.innerHTML = '';
  filteredEmojis.forEach(em => {
    const btn = document.createElement('button');
    btn.className = 'emoji-opt';
    btn.textContent = em;
    btn.title = em;
    btn.onclick = () => selectEmoji(em);
    grid.appendChild(btn);
  });
}

function filterEmojis() {
  const q = document.getElementById('emoji-search').value.toLowerCase();
  if (!q) {
    filteredEmojis = activeCat ? EMOJI_CATS[activeCat] : allEmojis;
  } else {
    filteredEmojis = allEmojis.filter(e => e.includes(q));
  }
  renderEmojiGrid();
}

function selectEmoji(em) {
  document.getElementById('emoji-display').textContent = em;
  document.getElementById('ed-emoji-text').value = em;
  closeEmojiPicker();
}

function toggleEmojiPicker(e) {
  e.stopPropagation();
  const picker = document.getElementById('emoji-picker');
  if (picker.classList.contains('open')) {
    closeEmojiPicker();
  } else {
    const rect = e.target.getBoundingClientRect();
    picker.style.top = (rect.bottom + 8) + 'px';
    picker.style.left = rect.left + 'px';
    picker.classList.add('open');
    buildEmojiPicker();
    document.getElementById('emoji-search').focus();
  }
}

function closeEmojiPicker() {
  document.getElementById('emoji-picker').classList.remove('open');
}

document.addEventListener('click', (e) => {
  if (!document.getElementById('emoji-picker').contains(e.target) &&
      e.target.id !== 'emoji-display') {
    closeEmojiPicker();
  }
});

// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
// YAML GENERATION
// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
function getFilename() {
  const ctx = document.getElementById('input-context').value.trim().replace(/\s+/g,'_') || 'CONTEXT';
  const prof = document.getElementById('input-profile').value.trim().replace(/\s+/g,'_') || 'PROFILE';
  const page = document.getElementById('input-page').value.trim().replace(/\s+/g,'_') || '01';
  return `${ctx}__${prof}__page${page}.yaml`;
}

function buildYaml() {
  const ctx = document.getElementById('input-context').value.trim() || '';
  const prof = document.getElementById('input-profile').value.trim() || '';
  const page = document.getElementById('input-page').value.trim() || '';
  let lines = [];
  lines.push(`# Stream Deck XL Layout вАФ ${ctx} / ${prof} / Page ${page}`);
  lines.push(`# Generated: ${new Date().toISOString()}`);
  lines.push('');
  lines.push('meta:');
  lines.push(`  context: "${ctx}"`);
  lines.push(`  profile: "${prof}"`);
  lines.push(`  page: "${page}"`);
  lines.push(`  device: "Stream Deck XL"`);
  lines.push(`  grid: "8x4"`);
  lines.push('');
  lines.push('buttons:');
  buttons.forEach(b => {
    if (!b.emoji && !b.label && !b.action && !b.notes && !b.script) return;
    lines.push(`  - id: ${b.id + 1}`);
    lines.push(`    row: ${b.row}`);
    lines.push(`    col: ${b.col}`);
    if (b.emoji)    lines.push(`    emoji: "${b.emoji}"`);
    if (b.label)    lines.push(`    label: "${b.label.replace(/"/g,'\\"')}"`);
    if (b.category) lines.push(`    category: "${b.category}"`);
    if (b.color)    lines.push(`    color: "${b.color}"`);
    if (b.action)   lines.push(`    action: "${b.action.replace(/"/g,'\\"')}"`);
    if (b.notes) {
      lines.push(`    notes: |`);
      b.notes.split('\n').forEach(l => lines.push(`      ${l}`));
    }
    if (b.script) {
      lines.push(`    script: |`);
      b.script.split('\n').forEach(l => lines.push(`      ${l}`));
    }
  });
  return lines.join('\n');
}

function saveYaml() {
  const yaml = buildYaml();
  const filename = getFilename();
  document.getElementById('yaml-output').textContent = yaml;
  document.getElementById('modal-filename').textContent = 'рЯУД ' + filename;
  document.getElementById('modal-overlay').classList.add('open');
}

function downloadYaml() {
  const yaml = document.getElementById('yaml-output').textContent;
  const filename = getFilename();
  const blob = new Blob([yaml], {type: 'text/yaml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  showToast('вЬУ Saved: ' + filename);
}

function copyYaml() {
  navigator.clipboard.writeText(document.getElementById('yaml-output').textContent);
  showToast('вЬУ Copied to clipboard');
}

function closeModal(e) {
  document.getElementById('modal-overlay').classList.remove('open');
}

// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
// LOAD YAML
// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
document.getElementById('yaml-file-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      loadFromYaml(ev.target.result);
      showToast('вЬУ Loaded: ' + file.name);
    } catch(err) {
      alert('Could not parse YAML: ' + err.message);
    }
  };
  reader.readAsText(file);
  this.value = '';
});

function loadFromYaml(text) {
  // Simple YAML parser for our specific format
  const lines = text.split('\n');
  // Parse meta
  const ctxMatch = text.match(/context:\s*"([^"]*)"/);
  const profMatch = text.match(/profile:\s*"([^"]*)"/);
  const pageMatch = text.match(/page:\s*"([^"]*)"/);
  if (ctxMatch) document.getElementById('input-context').value = ctxMatch[1];
  if (profMatch) document.getElementById('input-profile').value = profMatch[1];
  if (pageMatch) document.getElementById('input-page').value = pageMatch[1];

  // Reset buttons
  buttons = Array.from({length: ROWS * COLS}, (_, i) => ({
    id: i, row: Math.floor(i/COLS)+1, col:(i%COLS)+1,
    emoji:'', label:'', category:'', color:'', action:'', notes:'', script:''
  }));

  // Parse buttons block
  const buttonsSection = text.split('buttons:')[1];
  if (!buttonsSection) { renderGrid(); return; }

  // Split into individual button blocks by "  - id:"
  const blockPattern = /  - id:\s*(\d+)([\s\S]*?)(?=  - id:|\s*$)/g;
  let m;
  while ((m = blockPattern.exec(buttonsSection)) !== null) {
    const idx = parseInt(m[1]) - 1;
    if (idx < 0 || idx >= buttons.length) continue;
    const block = m[2];
    const get = (key) => {
      const r = block.match(new RegExp(`    ${key}: "([^"]*)"`, ''));
      return r ? r[1] : '';
    };
    const getBlock = (key) => {
      const r = block.match(new RegExp(`    ${key}: \\|\\n([\\s\\S]*?)(?=    \\w|$)`));
      if (!r) return '';
      return r[1].replace(/^      /gm, '').replace(/\n$/, '');
    };
    buttons[idx].emoji    = get('emoji');
    buttons[idx].label    = get('label');
    buttons[idx].category = get('category');
    buttons[idx].color    = get('color');
    buttons[idx].action   = get('action');
    buttons[idx].notes    = getBlock('notes');
    buttons[idx].script   = getBlock('script');
  }
  renderGrid();
  closeEditor();
}

// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
// CLEAR ALL
// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
function clearAll() {
  if (!confirm('Clear all 32 buttons?')) return;
  buttons = Array.from({length: ROWS * COLS}, (_, i) => ({
    id: i, row: Math.floor(i/COLS)+1, col:(i%COLS)+1,
    emoji:'', label:'', category:'', color:'', action:'', notes:'', script:''
  }));
  closeEditor();
  renderGrid();
  showToast('вЬУ Cleared');
}

// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
// TOAST
// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
// EMOJI TEXT INPUT sync
// вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('ed-emoji-text').addEventListener('input', function() {
    const v = this.value.trim();
    document.getElementById('emoji-display').textContent = v || 'пЉЛ';
  });
  renderGrid();
});
</script>
