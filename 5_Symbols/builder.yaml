<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream Deck XL Planner</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07090d;
  --surface: #0c1018;
  --surface2: #111722;
  --surface3: #161e2c;
  --border: #1c2535;
  --border2: #253040;
  --accent: #3b82f6;
  --accent2: #60a5fa;
  --accent-glow: rgba(59,130,246,0.25);
  --green: #22c55e;
  --green-glow: rgba(34,197,94,0.2);
  --amber: #f59e0b;
  --red: #ef4444;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #4a5568;
  --font-mono: 'JetBrains Mono', monospace;
  --font-display: 'Syne', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 14px; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Grid noise texture */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(59,130,246,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,0.015) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* вХРвХРвХР TOPBAR вХРвХРвХР */
.topbar {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(7,9,13,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  height: 52px;
}

.topbar-brand {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 1px;
  color: var(--accent2);
  white-space: nowrap;
  flex-shrink: 0;
}

.topbar-brand span { color: var(--text3); font-weight: 400; font-size: 11px; }

.divider { width: 1px; height: 24px; background: var(--border2); flex-shrink: 0; }

.meta-field {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.meta-label {
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text3);
  white-space: nowrap;
}

.meta-input {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 5px 10px;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
  height: 32px;
}

.meta-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-glow);
}

.meta-select {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 5px 10px;
  outline: none;
  cursor: pointer;
  height: 32px;
}

.meta-select:focus { border-color: var(--accent); }

#input-context { width: 140px; }
#input-profile { width: 120px; }
#input-page { width: 64px; }
#input-color { width: 42px; height: 32px; padding: 2px 4px; cursor: pointer; }

.topbar-spacer { flex: 1; }

.btn {
  height: 32px;
  padding: 0 14px;
  border-radius: 6px;
  border: none;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  flex-shrink: 0;
}

.btn-primary {
  background: var(--accent);
  color: white;
}
.btn-primary:hover { background: var(--accent2); box-shadow: 0 0 12px var(--accent-glow); }

.btn-ghost {
  background: var(--surface2);
  color: var(--text2);
  border: 1px solid var(--border2);
}
.btn-ghost:hover { background: var(--surface3); color: var(--text); border-color: var(--accent); }

.btn-danger {
  background: rgba(239,68,68,0.1);
  color: var(--red);
  border: 1px solid rgba(239,68,68,0.25);
}
.btn-danger:hover { background: rgba(239,68,68,0.2); }

.btn-success {
  background: rgba(34,197,94,0.1);
  color: var(--green);
  border: 1px solid rgba(34,197,94,0.25);
}
.btn-success:hover { background: rgba(34,197,94,0.2); box-shadow: 0 0 12px var(--green-glow); }

/* вХРвХРвХР MAIN вХРвХРвХР */
.main {
  position: relative;
  z-index: 1;
  padding: 28px 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
}

/* вХРвХРвХР DEVICE SHELL вХРвХРвХР */
.device-shell {
  background: linear-gradient(145deg, #111822, #0a1018);
  border: 1px solid #1e2d3d;
  border-radius: 20px;
  padding: 24px 22px 20px;
  box-shadow:
    0 0 0 1px rgba(59,130,246,0.06),
    0 32px 64px rgba(0,0,0,0.7),
    inset 0 1px 0 rgba(255,255,255,0.04);
  position: relative;
}

.device-shell::before {
  content: 'STREAM DECK XL  ¬Ј  8√Ч4';
  position: absolute;
  top: -11px;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--accent);
  background: var(--bg);
  padding: 0 12px;
  border: 1px solid rgba(59,130,246,0.3);
  border-radius: 4px;
}

/* вХРвХРвХР BUTTON GRID вХРвХРвХР */
.button-grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 8px;
}

/* Row labels */
.row-label {
  position: absolute;
  left: -20px;
  font-size: 8px;
  color: var(--text3);
  letter-spacing: 1px;
}

/* вХРвХРвХР KEY BUTTON вХРвХРвХР */
.key-btn {
  width: 72px;
  height: 72px;
  border-radius: 10px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
  user-select: none;
}

.key-btn:hover {
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent), 0 0 16px var(--accent-glow);
  transform: translateY(-1px);
  z-index: 5;
}

.key-btn.active {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent), 0 0 20px var(--accent-glow);
}

.key-btn.has-content { border-color: var(--border2); }
.key-btn.has-content:hover { border-color: var(--accent); }

.key-num {
  position: absolute;
  top: 4px;
  left: 5px;
  font-size: 7px;
  color: var(--text3);
  line-height: 1;
}

.key-has-note {
  position: absolute;
  top: 4px;
  right: 5px;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--amber);
  display: none;
}

.key-btn.has-note .key-has-note { display: block; }

.key-emoji {
  font-size: 24px;
  line-height: 1;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5));
}

.key-text {
  font-family: var(--font-mono);
  font-size: 7px;
  color: rgba(255,255,255,0.8);
  text-align: center;
  line-height: 1.3;
  padding: 0 4px;
  max-width: 100%;
  overflow: hidden;
  word-break: break-word;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

.key-empty-hint {
  font-size: 9px;
  color: var(--text3);
  line-height: 1;
}

/* Custom BG color overlay */
.key-color-overlay {
  position: absolute;
  inset: 0;
  border-radius: 9px;
  opacity: 0.18;
  pointer-events: none;
}

/* вХРвХРвХР EDITOR PANEL вХРвХРвХР */
.editor-panel {
  width: 100%;
  max-width: 680px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 20px 48px rgba(0,0,0,0.5);
  display: none;
}

.editor-panel.open { display: block; animation: slideIn 0.18s ease; }

@keyframes slideIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.editor-header {
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.editor-key-id {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 700;
  color: var(--accent2);
  letter-spacing: 1px;
  flex-shrink: 0;
}

.editor-close {
  margin-left: auto;
  width: 28px; height: 28px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.editor-close:hover { background: var(--surface3); color: var(--red); border-color: var(--red); }

.editor-body {
  padding: 20px 18px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.editor-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.field-group { display: flex; flex-direction: column; gap: 6px; }
.field-group.full { grid-column: 1 / -1; }

.field-label {
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text3);
}

.field-input {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 7px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 8px 12px;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
  width: 100%;
}

.field-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-glow);
}

.field-textarea {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 7px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 10px 12px;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
  width: 100%;
  resize: vertical;
  min-height: 100px;
  line-height: 1.6;
}

.field-textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-glow);
}

.field-textarea.script-area {
  min-height: 140px;
  background: #060a0f;
  border-color: #1a2535;
  color: #7dd3fc;
  font-size: 11px;
}

.field-textarea.script-area::placeholder { color: #2a3f55; }
.field-textarea.script-area:focus { border-color: var(--accent); }

/* Emoji picker trigger */
.emoji-trigger-row {
  display: flex;
  gap: 8px;
  align-items: center;
}

.emoji-display {
  width: 52px;
  height: 52px;
  border-radius: 10px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
}
.emoji-display:hover { border-color: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }

/* вХРвХРвХР EMOJI PICKER вХРвХРвХР */
.emoji-picker {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 12px;
  display: none;
  flex-direction: column;
  gap: 10px;
  position: fixed;
  z-index: 200;
  box-shadow: 0 24px 48px rgba(0,0,0,0.7);
  width: 340px;
  max-height: 420px;
}

.emoji-picker.open { display: flex; animation: slideIn 0.15s ease; }

.emoji-search {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 7px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 8px 12px;
  outline: none;
  width: 100%;
}
.emoji-search:focus { border-color: var(--accent); }

.emoji-cats {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.emoji-cat-btn {
  font-size: 14px;
  padding: 4px 8px;
  border-radius: 5px;
  background: transparent;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.1s;
}
.emoji-cat-btn:hover, .emoji-cat-btn.active { background: var(--surface2); border-color: var(--accent); }

.emoji-grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 3px;
  overflow-y: auto;
  max-height: 240px;
  padding-right: 4px;
}

.emoji-grid::-webkit-scrollbar { width: 4px; }
.emoji-grid::-webkit-scrollbar-track { background: var(--surface2); }
.emoji-grid::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.emoji-opt {
  width: 36px;
  height: 36px;
  border-radius: 6px;
  background: transparent;
  border: none;
  cursor: pointer;
  font-size: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.1s;
}
.emoji-opt:hover { background: var(--surface2); }

/* Color picker row */
.color-swatches {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.swatch {
  width: 26px;
  height: 26px;
  border-radius: 5px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.1s;
  flex-shrink: 0;
}
.swatch:hover, .swatch.selected { border-color: white; transform: scale(1.15); }
.swatch-none { background: var(--surface3); border: 1px dashed var(--border2); }

/* вХРвХРвХР CATEGORY BADGE вХРвХРвХР */
.cat-select {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 7px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 8px 12px;
  outline: none;
  cursor: pointer;
  width: 100%;
}
.cat-select:focus { border-color: var(--accent); }

/* вХРвХРвХР SAVE TOAST вХРвХРвХР */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--surface2);
  border: 1px solid var(--green);
  border-radius: 10px;
  padding: 12px 24px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--green);
  z-index: 300;
  transition: transform 0.25s ease;
  box-shadow: 0 0 24px var(--green-glow);
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* вХРвХРвХР YAML MODAL вХРвХРвХР */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 24px;
  width: 640px;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  gap: 14px;
  box-shadow: 0 32px 64px rgba(0,0,0,0.8);
}

.modal-title {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 700;
  color: var(--accent2);
}

.yaml-output {
  background: #050810;
  border: 1px solid #1a2535;
  border-radius: 8px;
  padding: 14px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: #7dd3fc;
  line-height: 1.7;
  overflow-y: auto;
  flex: 1;
  min-height: 200px;
  max-height: 400px;
  white-space: pre;
  tab-size: 2;
}

.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

/* Load section */
.load-section {
  display: flex;
  align-items: center;
  gap: 10px;
}

.file-input-label {
  height: 32px;
  padding: 0 14px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text2);
  font-family: var(--font-mono);
  font-size: 11px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.15s;
}
.file-input-label:hover { background: var(--surface3); border-color: var(--accent); color: var(--text); }

#yaml-file-input { display: none; }

/* вХРвХРвХР SCROLLBAR вХРвХРвХР */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-brand">SD¬ЈXL PLANNER <span>8√Ч4</span></div>
  <div class="divider"></div>
  <div class="meta-field">
    <span class="meta-label">Context</span>
    <input id="input-context" class="meta-input" type="text" placeholder="e.g. VIDEO" />
  </div>
  <div class="meta-field">
    <span class="meta-label">Profile</span>
    <input id="input-profile" class="meta-input" type="text" placeholder="e.g. RESOLVE" />
  </div>
  <div class="meta-field">
    <span class="meta-label">Page</span>
    <input id="input-page" class="meta-input" type="text" placeholder="01" style="width:60px;" />
  </div>
  <div class="divider"></div>
  <div class="topbar-spacer"></div>
  <label class="file-input-label" title="Load YAML file">
    вЖС Load YAML
    <input type="file" id="yaml-file-input" accept=".yaml,.yml" />
  </label>
  <button class="btn btn-ghost" onclick="clearAll()">вМЂ Clear</button>
  <button class="btn btn-success" onclick="saveYaml()">вЖУ Save YAML</button>
</div>

<!-- MAIN -->
<div class="main">
  <!-- Device -->
  <div class="device-shell">
    <div id="button-grid" class="button-grid"></div>
  </div>

  <!-- Editor Panel -->
  <div id="editor-panel" class="editor-panel">
    <div class="editor-header">
      <div class="editor-key-id" id="editor-key-id">KEY 01</div>
      <div style="font-size:11px;color:var(--text3);">Row <span id="ed-row">вАФ</span> ¬Ј Col <span id="ed-col">вАФ</span></div>
      <button class="editor-close" onclick="closeEditor()">вЬХ</button>
    </div>
    <div class="editor-body">

      <!-- Emoji + label row -->
      <div class="editor-row">
        <div class="field-group">
          <div class="field-label">Icon / Emoji</div>
          <div class="emoji-trigger-row">
            <div class="emoji-display" id="emoji-display" onclick="toggleEmojiPicker(event)">пЉЛ</div>
            <input id="ed-emoji-text" class="field-input" placeholder="or type emoji..." style="flex:1;" />
          </div>
        </div>
        <div class="field-group">
          <div class="field-label">Button Label</div>
          <input id="ed-label" class="field-input" placeholder="e.g. EXPORT" />
        </div>
      </div>

      <!-- Category + color -->
      <div class="editor-row">
        <div class="field-group">
          <div class="field-label">Category</div>
          <select id="ed-category" class="cat-select">
            <option value="">вАФ none вАФ</option>
            <option value="video">рЯОђ Video / Resolve</option>
            <option value="sre">вЪЩпЄП SRE / DevOps</option>
            <option value="ai">рЯ§Ц AI / Automation</option>
            <option value="contract">рЯУЛ Contract / Admin</option>
            <option value="family">рЯП† Family</option>
            <option value="focus">рЯОѓ Focus / Flow</option>
            <option value="system">рЯЦ•пЄП System</option>
            <option value="nav">вђ° Navigation</option>
          </select>
        </div>
        <div class="field-group">
          <div class="field-label">Key Tint</div>
          <div class="color-swatches" id="color-swatches">
            <div class="swatch swatch-none selected" data-color="" title="None" onclick="selectColor(this, '')"></div>
            <div class="swatch" data-color="#6a35c8" style="background:#6a35c8" onclick="selectColor(this,'#6a35c8')"></div>
            <div class="swatch" data-color="#1a5c42" style="background:#1a5c42" onclick="selectColor(this,'#1a5c42')"></div>
            <div class="swatch" data-color="#0055aa" style="background:#0055aa" onclick="selectColor(this,'#0055aa')"></div>
            <div class="swatch" data-color="#8b4513" style="background:#8b4513" onclick="selectColor(this,'#8b4513')"></div>
            <div class="swatch" data-color="#5c4a1a" style="background:#5c4a1a" onclick="selectColor(this,'#5c4a1a')"></div>
            <div class="swatch" data-color="#5c1a1a" style="background:#5c1a1a" onclick="selectColor(this,'#5c1a1a')"></div>
            <div class="swatch" data-color="#1a3a1a" style="background:#1a3a1a" onclick="selectColor(this,'#1a3a1a')"></div>
            <div class="swatch" data-color="#1a2535" style="background:#1a2535" onclick="selectColor(this,'#1a2535')"></div>
            <div class="swatch" data-color="#2d1055" style="background:#2d1055" onclick="selectColor(this,'#2d1055')"></div>
            <div class="swatch" data-color="#003333" style="background:#003333" onclick="selectColor(this,'#003333')"></div>
            <div class="swatch" data-color="#332200" style="background:#332200" onclick="selectColor(this,'#332200')"></div>
